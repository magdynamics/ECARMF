name: CI

# Gate: every push and PR must compile the backend, pass the full test suite,
# and typecheck + build the frontend. The kernel job runs on Windows because
# the test project targets net8.0-windows (WinRT OCR dependency) — it does not
# build on Linux.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  kernel:
    name: Platform Kernel (build + tests)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore ECARMF.sln
      - run: dotnet build ECARMF.sln --no-restore --configuration Release
      - run: dotnet test ECARMF.sln --no-build --configuration Release --nologo

  admin-ui:
    name: Admin UI (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/admin-ui/package-lock.json
      - run: npm ci --no-fund --no-audit
      - run: npx tsc --noEmit
      - run: npm run build
