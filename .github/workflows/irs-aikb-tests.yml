name: IRS-AIKB tests

on:
  pull_request:
    paths:
      - "IRS-AIKB/**"
      - ".github/workflows/irs-aikb-tests.yml"
  push:
    paths:
      - "IRS-AIKB/**"
      - ".github/workflows/irs-aikb-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IRS-AIKB
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests -v
