name: ecarmf-kernel

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-EcarmfKernel!Dev1}
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__ECARMF: "Server=sql,1433;Database=ECARMF_Kernel;User ID=sa;Password=${MSSQL_SA_PASSWORD:-EcarmfKernel!Dev1};TrustServerCertificate=True;MultipleActiveResultSets=True"
    ports:
      - "8080:8080"
    depends_on:
      sql:
        condition: service_healthy

volumes:
  sql-data:
